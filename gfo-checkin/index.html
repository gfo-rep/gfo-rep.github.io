<style>
  :root {
    --ink: #0f0e0c;
    --paper: #f5f0e8;
    --cream: #ede6d6;
    --accent: #c8401a;
    --accent-light: #f0d5cc;
    --muted: #7a7570;
    --border: #c8bfb0;
    --success: #2a6b3c;
    --success-bg: #d4edda;
    --mp-gold: #b8860b;
    --mp-gold-bg: #fdf6e3;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }

  .header {
    text-align: center;
    margin-bottom: 48px;
  }
  .header::after {
    content: '';
    display: block;
    width: 60px;
    height: 3px;
    background: var(--accent);
    margin: 20px auto 0;
  }
  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .header h1 em { font-style: italic; color: var(--accent); }
  .header p {
    margin-top: 10px;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Upload zone */
  .upload-zone {
    width: 100%;
    max-width: 560px;
    border: 2px dashed var(--border);
    border-radius: 4px;
    padding: 28px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--cream);
    margin-bottom: 40px;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .upload-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-zone .upload-icon { font-size: 1.8rem; margin-bottom: 8px; display: block; }
  .upload-zone .upload-label {
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .upload-zone .upload-label strong { color: var(--accent); font-weight: 500; }
  .upload-zone.loaded {
    border-style: solid;
    border-color: var(--success);
    background: var(--success-bg);
  }
  .upload-zone.loaded .upload-label { color: var(--success); }

  /* Card */
  .card {
    width: 100%;
    max-width: 560px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 36px;
    box-shadow: 4px 4px 0 var(--cream);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }
  @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

  .field { display: flex; flex-direction: column; gap: 6px; position: relative; }

  label {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }

  input[type="text"] {
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--paper);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    width: 100%;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
    background: white;
  }

  /* Autocomplete */
  .autocomplete-wrapper { position: relative; }
  .dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: white;
    border: 1px solid var(--border);
    border-radius: 3px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    z-index: 100;
    max-height: 220px;
    overflow-y: auto;
    display: none;
  }
  .dropdown.open { display: block; }
  .dropdown-item {
    padding: 10px 14px;
    font-size: 0.85rem;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--cream);
    transition: background 0.1s;
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover, .dropdown-item.active {
    background: var(--accent-light);
    color: var(--accent);
  }
  .dropdown-item .item-name { font-weight: 500; }
  .dropdown-item .item-affil {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* Radio pills */
  .radio-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .radio-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-size: 0.78rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: all 0.15s;
    user-select: none;
    background: var(--paper);
  }
  .radio-pill input { display: none; }
  .radio-pill:hover { border-color: var(--accent); background: var(--accent-light); }
  .radio-pill.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* MP pill gets gold treatment when selected */
  .radio-pill.mp-pill.selected {
    background: var(--mp-gold);
    border-color: var(--mp-gold);
    color: white;
  }
  .radio-pill.mp-pill:hover {
    border-color: var(--mp-gold);
    background: var(--mp-gold-bg);
    color: var(--mp-gold);
  }

  .radio-pill .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    flex-shrink: 0;
  }
  .radio-pill.selected .dot { background: white; border-color: white; }

  .section-label {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    font-weight: 500;
    display: block;
  }

  /* MP alert badge — shows when MP is selected */
  .mp-alert-badge {
    display: none;
    align-items: center;
    gap: 8px;
    background: var(--mp-gold-bg);
    border: 1px solid var(--mp-gold);
    border-radius: 3px;
    padding: 8px 12px;
    font-size: 0.72rem;
    color: var(--mp-gold);
    letter-spacing: 0.04em;
    margin-bottom: 20px;
  }
  .mp-alert-badge.show { display: flex; }

  /* Submit */
  .btn-submit {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-submit:hover:not(:disabled) {
    background: #a83515;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(200,64,26,0.3);
  }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Success & notification banners */
  .banner {
    display: none;
    border-radius: 3px;
    padding: 16px 20px;
    margin-top: 16px;
    text-align: center;
    animation: fadeIn 0.3s ease;
  }
  .banner.show { display: block; }
  .banner strong {
    display: block;
    font-size: 0.95rem;
    margin-bottom: 3px;
    font-family: 'DM Serif Display', serif;
  }
  .banner span { font-size: 0.72rem; opacity: 0.8; }

  .banner-success {
    background: var(--success-bg);
    border: 1px solid var(--success);
    color: var(--success);
  }
  .banner-mp {
    background: var(--mp-gold-bg);
    border: 1px solid var(--mp-gold);
    color: var(--mp-gold);
  }

  .error-msg {
    font-size: 0.72rem;
    color: var(--accent);
    margin-top: 4px;
    display: none;
    letter-spacing: 0.04em;
  }
  .error-msg.show { display: block; }

  .divider { border: none; border-top: 1px solid var(--cream); margin: 24px 0; }

  .status-bar {
    width: 100%;
    max-width: 560px;
    display: flex;
    justify-content: space-between;
    margin-top: 16px;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .config-notice {
    width: 100%;
    max-width: 560px;
    background: #fff8e7;
    border: 1px solid #e8d58a;
    border-radius: 3px;
    padding: 12px 16px;
    font-size: 0.72rem;
    color: #7a6a20;
    margin-bottom: 24px;
    letter-spacing: 0.03em;
    line-height: 1.6;
  }
  .config-notice code {
    background: #f0e8c8;
    padding: 1px 5px;
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>

  // ── AUTOCOMPLETE ──────────────────────────────────────────────
  const firstInput  = document.getElementById('firstName');
  const lastInput   = document.getElementById('lastName');
  const dropFirst   = document.getElementById('dropdownFirst');
  const dropLast    = document.getElementById('dropdownLast');

  function search(query, field) {
    if (!query) return [];
    const q = query.toLowerCase();
    return attendees.filter(a => {
      const target = field === 'first' ? a.firstName.toLowerCase() : a.lastName.toLowerCase();
      return target.startsWith(q) || `${a.firstName} ${a.lastName}`.toLowerCase().includes(q);
    }).slice(0, 8);
  }

  function renderDropdown(results, dropdown) {
    dropdown.innerHTML = '';
    if (!results.length) { dropdown.classList.remove('open'); return; }
    results.forEach((a, i) => {
      const item = document.createElement('div');
      item.className = 'dropdown-item';
      item.innerHTML = `<span class="item-name">${a.firstName} ${a.lastName}</span>
                        ${a.affiliation ? `<span class="item-affil">${a.affiliation}</span>` : ''}`;
      item.addEventListener('mousedown', e => {
        e.preventDefault();
        fillFromAttendee(a);
        closeAllDropdowns();
      });
      dropdown.appendChild(item);
    });
    dropdown.classList.add('open');
    activeIndex = -1;
  }

  function fillFromAttendee(a) {
    firstInput.value  = a.firstName;
    lastInput.value   = a.lastName;
    if (a.affiliation) document.getElementById('affiliation').value = a.affiliation;
    // Auto-select stakeholder type
    if (a.type) {
      const radio = document.querySelector(`input[name="stakeholder"][value="${a.type}"]`);
      if (radio) {
        radio.checked = true;
        document.querySelectorAll('.radio-pill').forEach(p => p.classList.remove('selected'));
        radio.closest('.radio-pill').classList.add('selected');
        document.getElementById('mpAlertBadge').classList.toggle('show', a.type === 'MP');
      }
    }
  }

  function closeAllDropdowns() {
    dropFirst.classList.remove('open');
    dropLast.classList.remove('open');
    activeIndex = -1;
  }

  firstInput.addEventListener('input', () => renderDropdown(search(firstInput.value, 'first'), dropFirst));
  lastInput.addEventListener('input',  () => renderDropdown(search(lastInput.value, 'last'),   dropLast));

  [firstInput, lastInput].forEach((inp, idx) => {
    const drop = idx === 0 ? dropFirst : dropLast;
    inp.addEventListener('keydown', e => {
      const items = drop.querySelectorAll('.dropdown-item');
      if (!drop.classList.contains('open')) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIndex = Math.min(activeIndex + 1, items.length - 1);
        items.forEach((el, i) => el.classList.toggle('active', i === activeIndex));
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIndex = Math.max(activeIndex - 1, -1);
        items.forEach((el, i) => el.classList.toggle('active', i === activeIndex));
      } else if (e.key === 'Enter' && activeIndex >= 0) {
        e.preventDefault();
        items[activeIndex].dispatchEvent(new Event('mousedown'));
      } else if (e.key === 'Escape') {
        closeAllDropdowns();
      }
    });
    inp.addEventListener('blur', () => setTimeout(closeAllDropdowns, 150));
  });

  // ── STAKEHOLDER RADIO ─────────────────────────────────────────
  document.querySelectorAll('.radio-pill input').forEach(radio => {
    radio.addEventListener('change', () => {
      document.querySelectorAll('.radio-pill').forEach(p => p.classList.remove('selected'));
      radio.closest('.radio-pill').classList.add('selected');
      document.getElementById('stakeholderError').classList.remove('show');
      // Show MP alert badge only when MP is selected
      document.getElementById('mpAlertBadge').classList.toggle('show', radio.value === 'MP');
    });
  });

  // ── ONESIGNAL PUSH via Cloudflare Worker ─────────────────────
  async function notifyMP(firstName, lastName) {
    try {
      await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ firstName, lastName, appId: ONESIGNAL_APP_ID })
      });
    } catch (err) {
      console.warn('Push notification failed:', err);
    }
  }

  // ── FORM SUBMIT ───────────────────────────────────────────────
  document.getElementById('checkinForm').addEventListener('submit', async e => {
    e.preventDefault();

    const firstName   = firstInput.value.trim();
    const lastName    = lastInput.value.trim();
    const affiliation = document.getElementById('affiliation').value.trim();
    const stakeholder = document.querySelector('input[name="stakeholder"]:checked');
    const isMP        = stakeholder?.value === 'MP';

    if (!stakeholder) {
      document.getElementById('stakeholderError').classList.add('show');
      return;
    }

    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting…';

    // 1. Submit to Web3Forms
    try {
      const res = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({
          access_key:        WEB3FORMS_KEY,
          'First Name':      firstName,
          'Last Name':       lastName,
          'Affiliation':     affiliation,
          'Stakeholder Type': stakeholder.value,
          subject:           `Check-In: ${firstName} ${lastName} (${stakeholder.value})`
        })
      });
      const data = await res.json();

      if (!data.success) {
        alert('Submission failed: ' + (data.message || 'Unknown error'));
        submitBtn.disabled = false;
        submitBtn.textContent = 'Check In →';
        return;
      }
    } catch (err) {
      alert('Network error. Please try again.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Check In →';
      return;
    }

    // 2. If MP — fire push notification via Worker
    if (isMP) notifyMP(firstName, lastName);

    // 3. Update UI
    checkinCount++;
    document.getElementById('checkinCount').textContent = `${checkinCount} checked in`;

    // Success banner
    const successBanner = document.getElementById('successBanner');
    document.getElementById('successName').textContent = `${firstName} ${lastName} — checked in ✓`;
    successBanner.classList.add('show');
    setTimeout(() => successBanner.classList.remove('show'), 4000);

    // MP banner
    if (isMP) {
      const mpBanner = document.getElementById('mpBanner');
      document.getElementById('mpName').textContent = `🏛️ MP alert sent for ${firstName} ${lastName}`;
      mpBanner.classList.add('show');
      setTimeout(() => mpBanner.classList.remove('show'), 5000);
    }

    resetForm();
    submitBtn.disabled = false;
    submitBtn.textContent = 'Check In →';
  });

  function resetForm() {
    firstInput.value  = '';
    lastInput.value   = '';
    document.getElementById('affiliation').value = '';
    document.querySelectorAll('.radio-pill').forEach(p => p.classList.remove('selected'));
    document.querySelectorAll('input[name="stakeholder"]').forEach(r => r.checked = false);
    document.getElementById('mpAlertBadge').classList.remove('show');
    firstInput.focus();
  }
</script>
